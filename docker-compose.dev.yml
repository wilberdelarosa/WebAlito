services:
  postgres:
    image: postgres:16-alpine
    container_name: medusa-base-postgres
    environment:
      POSTGRES_DB: medusa_dtc
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
    ports:
      - "5432:5432"
    volumes:
      - medusa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa_dtc"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: medusa-base-redis
    ports:
      - "6379:6379"
    volumes:
      - medusa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  medusa_postgres_data:
  medusa_redis_data: